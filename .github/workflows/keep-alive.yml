name: Keep Render Service Awake

on:
  schedule:
    # Runs every 10 minutes to prevent Render free-tier spin-down (15-min limit)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  ping-service:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          curl -s -f -I https://fincontext-ulqw.onrender.com/health || echo "Ping failed, but continuing workflow"
